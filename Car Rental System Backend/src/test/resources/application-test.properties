spring.datasource.url=jdbc:h2:mem:carrentaldb;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

app.jwt.secret=ChangeThisSecretKeyToASecureBase64ValueWithAtLeast32Bytes12345
app.jwt.expiration=86400000

spring.security.oauth2.client.registration.github.client-id=test-client-id
spring.security.oauth2.client.registration.github.client-secret=test-client-secret

spring.rabbitmq.listener.simple.auto-startup=false

app.rabbitmq.exchange=car-rental.exchange
app.rabbitmq.queue=car-rental.notifications
app.rabbitmq.routing-key=car-rental.notification
app.rabbitmq.booking.queue=car-rental.bookings
app.rabbitmq.booking.routing-key=car-rental.booking.created
